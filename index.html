<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Accueil – Mémoire Hilaire Barbot</title>
<style>
body{
    font-family: "Times New Roman", serif;
    margin:0;
    background:#f7f7f7;
}
header{
    background:#1e3a8a;
    color:white;
    padding:40px;
    text-align:center;
}
section{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.08);
}
h2{
    border-bottom:1px solid #ddd;
    padding-bottom:10px;
}
.card{
    margin:20px 0;
    padding:20px;
    border-radius:15px;
    background:#fafafa;
}
button{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#1e3a8a;
    color:white;
    cursor:pointer;
}
iframe{
    width:100%;
    height:400px;
    border-radius:15px;
}
</style>
</head>

<body>

<header>
<h1>Bienvenue sur mon espace mémoire</h1>
<p>Hilaire Barbot</p>
</header>

<section>
<h2>📘 Documents</h2>
<div class="card">
<p>Accédez à mon mémoire et à mes travaux académiques.</p>
<a href="memoire.pdf" target="_blank">
<button>Lire le mémoire PDF</button>
</a>
</div>
</section>

<section>
<h2>🎥 Vidéos</h2>
<div class="card">
<p>Vidéo de présentation ou contenu explicatif.</p>
<iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
</div>
</section>

<section>
<h2>🔗 Liens utiles</h2>
<div class="card">
<ul>
<li><a href="#">Lien 1</a></li>
<li><a href="#">Lien 2</a></li>
<li><a href="#">Lien 3</a></li>
</ul>
</div>
</section>

</body>
</html>
