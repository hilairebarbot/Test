<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Accueil – Mémoire Hilaire Barbot</title>
<style>
body{
    margin:0;
    font-family: "Times New Roman", serif;
    background:#060b2e;
    color:white;
}

header{
    min-height:90vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(180deg,#0b0f3a,#050720);
    background-image:url('BB.png');
    background-size:cover;
    background-position:center;
    padding:40px;
}

header h1{
    font-size:60px;
    margin-bottom:20px;
}

header p{
    font-size:20px;
    opacity:0.85;
}

.buttons{
    margin-top:30px;
    display:flex;
    gap:20px;
}

button{
    padding:14px 28px;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.primary-btn{
    background:#6b5cff;
    color:white;
}

.secondary-btn{
    background:rgba(255,255,255,0.08);
    color:white;
}

section{
    max-width:1000px;
    margin:60px auto;
    background:rgba(255,255,255,0.03);
    padding:40px;
    border-radius:30px;
    backdrop-filter:blur(20px);
}

h2{
    border-bottom:1px solid rgba(255,255,255,0.1);
    padding-bottom:12px;
}

.card{
    margin-top:25px;
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,0.04);
}

iframe{
    width:100%;
    height:420px;
    border-radius:18px;
}

ul{
    line-height:2;
}

</style>
</head>

<body>

<header>
<h1>Secure your research, share your knowledge</h1>
<p>Mémoire – Hilaire Barbot</p>

<div class="buttons">
<a href="memoire.pdf" target="_blank">
<button class="primary-btn">📘 Lire le mémoire</button>
</a>

<button class="secondary-btn">📩 Me contacter</button>
</div>
</header>

<section>
<h2>📚 Documents</h2>
<div class="card">
<p>Accédez au mémoire et aux travaux académiques associés.</p>
<a href="memoire.pdf" target="_blank">
<button class="primary-btn">Ouvrir le PDF</button>
</a>
</div>
</section>

<section>
<h2>🎥 Vidéo de présentation</h2>
<div class="card">
<p>Présentation du travail de recherche.</p>
<iframe src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe>
</div>
</section>

<section>
<h2>🔗 Liens utiles</h2>
<div class="card">
<ul>
<li><a href="#" style="color:white">Lien académique 1</a></li>
<li><a href="#" style="color:white">Lien académique 2</a></li>
<li><a href="#" style="color:white">Lien académique 3</a></li>
</ul>
</div>
</section>

</body>
</html>
